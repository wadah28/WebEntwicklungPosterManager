<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style/posterdesigner.css" media="screen" >
  <title>Poster Designer</title>
</head>
<body>

  <header>
    <h1>Poster Content Management</h1>
</header>

<nav class ="navigation" >
    <a href="CMS.html" id="links">Home</a>
    <a href="myAccout.html" id="links"> My Account</a>
    <a href="MoreInfo.html" id="links">More info</a>
    <a href="posterdesigner.html" id="posterdesigner">Create Poster</a>
</nav>

  <main id="grid">
    <h1>Poster erstellen / bearbeiten</h1>

    <form>
      <fieldset>
        <legend>Meta-Daten</legend>
        <label for="poster-title">Titel:</label>
        <input type="text" id="poster-title" name="poster-title" required>

        <label for="author">Autor:</label>
        <input type="text" id="author" name="author" required>

        <label for="date">Erstellt am:</label>
        <input type="date" id="date" name="date" required>
      </fieldset>

      <fieldset>
        <legend>Hauptüberschrift</legend>
        <input type="text" name="main-headline" placeholder="Hauptüberschrift" required>
      </fieldset>
<!-- optional -->
      <fieldset>
        <legend>Abschnitt 1</legend>
        <label>Subheadline:</label>
        <input type="text" name="section1-headline" >

        <label>Text:</label>
        <textarea name="section1-text" rows="6" ></textarea>

        <label>Bild:</label>
        <input type="file" name="section1-image" accept="image/*">
      </fieldset>

      <fieldset>
        <legend>Abschnitt 2</legend>
        <label>Subheadline:</label>
        <input type="text" name="section2-headline" >

        <label>Text:</label>
        <textarea name="section2-text" rows="6" ></textarea>

        <label>Bild:</label>
        <input type="file" name="section2-image" accept="image/*">
      </fieldset>

      <fieldset>
        <legend>Abschnitt 3</legend>
        <label>Subheadline:</label>
        <input type="text" name="section3-headline" >

        <label>Text:</label>
        <textarea name="section3-text" rows="6" ></textarea>

        <label>Bild:</label>
        <input type="file" name="section3-image" accept="image/*">
      </fieldset>


      <button type="submit">Poster speichern</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Poster CMS</p>
  </footer>

</body>
</html>
